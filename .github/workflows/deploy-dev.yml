name: Deploy Backup to Dev Server

on:
  push:
    branches:
      - dev

permissions:
  contents: read

env:
  DEV_CUSTOM_DOMAIN: "dev.ericspencer.us"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy backup-site to dev repo
        env:
          DEV_DEPLOY_TOKEN: ${{ secrets.DEV_DEPLOY_TOKEN }}
        run: |
          set -x
          if [ -z "$DEV_DEPLOY_TOKEN" ]; then
            echo "ERROR: DEV_DEPLOY_TOKEN secret is not set!"
            exit 1
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone "https://oauth2:${DEV_DEPLOY_TOKEN}@github.com/EricSpencer00/dev.ericspencer00.github.io.git" /tmp/devsite

          find /tmp/devsite -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -a "$GITHUB_WORKSPACE/backup-site/." /tmp/devsite/

          echo "$DEV_CUSTOM_DOMAIN" > /tmp/devsite/CNAME

          cd /tmp/devsite
          git add -A

          if git diff --quiet --cached; then
            echo "No changes to deploy"
            exit 0
          fi

          git commit -m "Deploy dev site from $GITHUB_REPOSITORY@${GITHUB_SHA::7}"
          git push origin main
