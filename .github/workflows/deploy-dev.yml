- name: Deploy to dev site repo
        env:
          DEV_DEPLOY_TOKEN: ${{ secrets.DEV_DEPLOY_TOKEN }}   # <-- PAT, not GITHUB_TOKEN
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone https://github.com/EricSpencer00/dev.ericspencer00.github.io.git /tmp/devsite
          git -C /tmp/devsite remote set-url origin https://$DEV_DEPLOY_TOKEN@github.com/EricSpencer00/dev.ericspencer00.github.io.git

          rm -rf /tmp/devsite/*
          cp -a "$GITHUB_WORKSPACE/public/." /tmp/devsite/

          git -C /tmp/devsite add -A

          if git -C /tmp/devsite diff --quiet --cached; then
            echo "No changes to deploy"
            exit 0
          fi

          git -C /tmp/devsite commit -m "Deploy dev site from $GITHUB_REPOSITORY@${GITHUB_SHA::7}"
          git -C /tmp/devsite push origin main