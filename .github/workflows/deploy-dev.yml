name: Deploy to Dev Server

on:
  push:
    branches:
      - dev

permissions:
  contents: read

env:
  HUGO_BASEURL: "https://dev.ericspencer00.github.io/"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.145.0'
          extended: true

      - name: Build Hugo site
        run: |
          rm -rf public
          hugo --minify --baseURL "$HUGO_BASEURL"

      - name: Verify Hugo build output
        run: |
          if [ ! -d "public" ]; then
            echo "Error: Hugo build did not generate the public/ directory."
            exit 1
          fi

      - name: Deploy to dev site repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone https://github.com/EricSpencer00/dev.ericspencer00.github.io.git /tmp/devsite
          git -C /tmp/devsite remote set-url origin https://${{ secrets.GITHUB_TOKEN }}@github.com/EricSpencer00/dev.ericspencer00.github.io.git

          rm -rf /tmp/devsite/*
          cp -a "$GITHUB_WORKSPACE/public/." /tmp/devsite/   # <-- fix: absolute path

          git -C /tmp/devsite add -A

          if git -C /tmp/devsite diff --quiet --cached; then
            echo "No changes to deploy"
            exit 0
          fi

          git -C /tmp/devsite commit -m "Deploy dev site from $GITHUB_REPOSITORY@${GITHUB_SHA::7}"
          git -C /tmp/devsite push origin main