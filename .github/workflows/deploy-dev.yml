name: Deploy to dev.ericspencer.us

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build index.html from content/*.txt
        run: python3 scripts/build.py
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEV_DEPLOY_SSH_KEY }}
      - name: Push to dev.EricSpencer00.github.io
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          echo "dev.ericspencer.us" > CNAME
          git add CNAME index.html
          git commit --allow-empty -m "chore: build + set dev CNAME"
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git remote add dev-site git@github.com:EricSpencer00/dev.EricSpencer00.github.io.git
          git push dev-site HEAD:main --force
